repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.8
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
        exclude: ^(.*\.lock|.*\.svg|frontend/package-lock\.json|backend/uv\.lock)$
      - id: trailing-whitespace
        exclude: ^(.*\.lock|.*\.svg)$
      - id: check-yaml
        exclude: ^terraform/
      - id: check-merge-conflict
      - id: detect-private-key
