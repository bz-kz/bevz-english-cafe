version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3010:3010"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8010
      - BACKEND_URL=http://backend:8010
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8010:8010"
    volumes:
      - ./backend:/app
    environment:
      - FIRESTORE_EMULATOR_HOST=firestore-emulator:8080
      - GCP_PROJECT_ID=english-cafe-dev
      - ENVIRONMENT=development
      - CORS_ORIGINS=http://localhost:3010
    depends_on:
      - firestore-emulator

  firestore-emulator:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    command: ["gcloud", "emulators", "firestore", "start", "--host-port=0.0.0.0:8080", "--project=english-cafe-dev"]
    ports:
      - "8080:8080"
