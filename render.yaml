services:
  - type: web
    name: english-cafe-backend
    runtime: python
    buildCommand: "cd backend && pip install -e ."
    startCommand: "cd backend && python -m app.main"
    autoDeploy: true
    repo: https://github.com/your-username/your-repo
    branch: main
    # 本番で必要な環境変数のキー一覧（値は Render ダッシュボードで設定すること）
    # ここではキーのみ列挙する。値（特にシークレット）は YAML に書かない。
    #
    # envVars (configure values in Render dashboard):
    #   ENVIRONMENT=production       # "development" / "test" 以外を指定すると SMTP 経由になる
    #   SMTP_HOST=                   # 例: smtp.gmail.com
    #   SMTP_PORT=                   # 例: 587
    #   SMTP_USER=                   # 空にすると MockEmailService にフォールバック
    #   SMTP_PASSWORD=               # SMTP のアプリパスワード等
    #   FROM_EMAIL=                  # 送信元アドレス
    #   ADMIN_EMAIL=                 # 問い合わせ通知の宛先（管理者）
    #   CORS_ORIGINS=                # カンマ区切りの完全 origin URL（末尾スラッシュ無）
    #                                # 例: https://english-cafe.vercel.app,https://www.english-cafe.com
    #                                # ※ *.vercel.app の preview URL は app/main.py の
    #                                #    allow_origin_regex で別途許可される
    #   DATABASE_URL=                # Render Postgres から自動注入される想定
